version: 2

models:
  - name: example
    description: "A simple test model to validate dbt + Snowflake connection."
    columns:
      - name: now
        description: "Current timestamp returned by Snowflake."
      - name: message
        description: "Static test message."

  - name: sales_by_day
    description: "Daily sales totals and average order value calculated from orders."
    columns:
      - name: order_date
        description: "Date of the order."
      - name: total_orders
        description: "Number of orders on that day."
      - name: total_revenue
        description: "Total revenue collected on that day."
      - name: avg_order_value
        description: "Average order amount for that day."

  - name: customer_lifetime_value
    description: "Customer lifetime revenue and order statistics."
    columns:
      - name: customer_id
        description: "Customer identifier."
      - name: first_order_date
        description: "Date of the customer's first order."
      - name: last_order_date
        description: "Date of the customer's most recent order."
      - name: order_count
        description: "Total number of orders for the customer."
      - name: lifetime_revenue
        description: "Total revenue attributed to the customer."
      - name: avg_order_value
        description: "Average revenue per order for the customer."

  - name: top_products
    description: "Top products ranked by sales revenue and quantity sold."
    columns:
      - name: product_id
        description: "Product identifier."
      - name: product_name
        description: "Product name from the products table."
      - name: total_quantity
        description: "Total units sold."
      - name: total_sales
        description: "Total revenue for the product."

  - name: weekly_active_customers
    description: "Weekly active customer counts from order activity."
    columns:
      - name: week_start
        description: "Beginning of the week for the activity window."
      - name: active_customers
        description: "Unique customers who placed orders in the week."

  - name: fact_transactions
    description: "Transaction-level semantic fact combining orders and order_items with customer context."
    semantic_model:
      enabled: true
    columns:
      - name: transaction_id
        description: "Unique transaction identifier for the order."
        entity:
          type: primary
          name: transaction
      - name: customer_id
        description: "Customer identifier associated with the transaction."
        entity:
          type: foreign
          name: customer
      - name: transaction_date
        description: "Date when the transaction occurred."
        dimension:
          type: time
          granularity: day
      - name: order_country
        description: "Country of the customer at the time of the transaction."
        dimension:
          type: categorical
      - name: transaction_total
        description: "Total order amount summed across order items."
      - name: average_transaction_total
        description: "Average sale price per item in the transaction."
      - name: median_sales
        description: "Median sale price across items in the transaction."
    metrics:
      - name: transaction_total
        label: Total Transaction Value
        type: sum
        expr: transaction_total
      - name: average_transaction_total
        label: Average Transaction Value
        type: average
        expr: average_transaction_total
      - name: median_sales
        label: Median Item Sale Price
        type: median
        expr: median_sales

  - name: dim_customers
    description: "Customer dimension built from the users source."
    semantic_model:
      enabled: true
    columns:
      - name: customer_id
        description: "Primary customer identifier."
        entity:
          type: primary
          name: customer
      - name: first_name
        description: "Customer first name."
        dimension:
          type: categorical
      - name: last_name
        description: "Customer last name."
        dimension:
          type: categorical
      - name: email
        description: "Customer email address."
        dimension:
          type: categorical
      - name: country
        description: "Customer country of residence."
        dimension:
          type: categorical
      - name: state
        description: "Customer state or region."
        dimension:
          type: categorical
      - name: created_date
        description: "Customer creation date."
        dimension:
          type: time
          granularity: day
